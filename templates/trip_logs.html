{% extends 'base.html' %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">บันทึกการเดินรถ (Trip Logs)</h2>

<div class="bg-white p-6 rounded shadow mb-6">
    <h3 class="font-bold mb-4 text-blue-600">➕ บันทึกรอบวิ่งใหม่</h3>
    <form action="/add_trip_log" method="POST" class="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
        <div><label class="block text-xs">วันที่</label><input type="date" name="log_date" required class="border p-2 rounded w-full text-sm"></div>
        <div><label class="block text-xs">รถโดยสาร</label>
            <select name="vehicle_id" class="border p-2 rounded w-full text-sm">
                {% for v in vehicles %}<option value="{{ v.vehicle_id }}">{{ v.plate_number }}</option>{% endfor %}
            </select>
        </div>
        <div><label class="block text-xs">คนขับ</label>
            <select name="driver_id" class="border p-2 rounded w-full text-sm">
                {% for d in drivers %}<option value="{{ d.driver_id }}">{{ d.name }}</option>{% endfor %}
            </select>
        </div>
        <div><label class="block text-xs">สายรถ</label>
            <select name="route_id" class="border p-2 rounded w-full text-sm">
                {% for r in routes %}<option value="{{ r.route_id }}">สาย {{ r.route_num }}</option>{% endfor %}
            </select>
        </div>
        <div><label class="block text-xs">สถานะ</label>
            <select name="status" class="border p-2 rounded w-full text-sm" required>
                <option value="Scheduled">Scheduled (รอรอบวิ่ง)</option>
                <option value="In Progress">In Progress (กำลังวิ่ง)</option>
                <option value="Completed">Completed (เสร็จสิ้น)</option>
                <option value="Delayed">Delayed (ล่าช้า)</option>
            </select>
        </div>
        <button type="submit" class="bg-green-600 text-white p-2 rounded hover:bg-green-700">บันทึกรอบวิ่ง</button>
    </form>
</div>

<div class="bg-white rounded shadow overflow-hidden">
    <table class="w-full text-left">
        <tr class="bg-gray-200"><th class="p-3">วันที่</th><th class="p-3">ทะเบียน</th><th class="p-3">คนขับ</th><th class="p-3">สาย</th><th class="p-3">สถานะ</th><th class="p-3">จัดการ</th></tr>
        {% for t in items %}
        <tr class="border-b">
            <td class="p-3">{{ t.date }}</td><td class="p-3">{{ t.vehicle }}</td><td class="p-3">{{ t.driver }}</td><td class="p-3">{{ t.route }}</td>
            <td class="p-3"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">{{ t.status }}</span></td>
            <td class="p-3"><a href="/delete_trip_log/{{ t.id }}" class="text-red-600" onclick="return confirm('ลบบันทึกรอบวิ่งนี้?');">🗑️ ลบ</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
