{% extends 'base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-4 text-gray-800">Dashboard ภาพรวมการเดินรถ</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
        <h3 class="text-gray-500 text-sm">จำนวนรถในระบบทั้งหมด</h3>
        <p class="text-3xl font-bold">{{ total }} คัน</p>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
        <h3 class="text-gray-500 text-sm">กำลังให้บริการ</h3>
        <p class="text-3xl font-bold text-green-600">{{ active }} คัน</p>
    </div>
</div>
{% endblock %}
